name: Refresh Codental Session

on:
  schedule:
    - cron: '*/59 * * * *'  # a cada ~59 minutos
  workflow_dispatch:          # permite rodar manualmente

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install playwright mongodb

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Refresh Codental session
        env:
          CODENTAL_EMAIL: ${{ secrets.CODENTAL_EMAIL }}
          CODENTAL_PASSWORD: ${{ secrets.CODENTAL_PASSWORD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: node .github/scripts/refresh-session.js

      - name: Auto-resolver pendências com prontuário 100% batido
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          curl -sf -X POST "https://gmailcodental-monitor.vercel.app/api/review" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${API_KEY:-Deuse10}" \
            -d '{"action":"auto_resolve"}'
